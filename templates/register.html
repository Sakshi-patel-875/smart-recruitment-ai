<!DOCTYPE html>
<html>
<head>

<title>Create Recruiter Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background: linear-gradient(135deg,#eef2ff,#f8f9ff);
font-family:'Segoe UI',sans-serif;
}

/* center layout */
.register-wrapper{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* card styling */
.register-card{
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:100%;
max-width:420px;
}

/* headings */
.register-title{
font-weight:600;
text-align:center;
margin-bottom:5px;
}

.register-sub{
font-size:14px;
color:#6c757d;
text-align:center;
margin-bottom:25px;
}

/* form inputs */
.form-control{
border-radius:8px;
padding:10px;
}

/* register button */
.btn-primary{
border-radius:8px;
padding:10px;
font-weight:500;
}

/* login link */
.login-link{
text-align:center;
margin-top:18px;
font-size:14px;
}

.login-link a{
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-wrapper">

<div class="register-card">

<h3 class="register-title">Create Recruiter Account</h3>
<div class="register-sub">Start using the AI hiring assistant</div>

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">

    <label class="form-label">Password</label>
    
    <div class="input-group">
    
    <input 
    type="password" 
    name="password" 
    id="password"
    class="form-control"
    minlength="6"
    required
    onkeyup="checkStrength(); checkMatch();"
    >
    
    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
    <i class="bi bi-eye" id="eyeIcon"></i>
    </button>
    
    </div>
    
    <div id="strengthBar" class="progress-bar"></div>
    
    <div id="passwordStrength" class="small mt-1"></div>
    
</div>

<div class="mb-3">

    <label class="form-label">Confirm Password</label>
    
    <input 
    type="password"
    id="confirmPassword"
    class="form-control"
    required
    onkeyup="checkMatch()"
    >
    
    <div id="matchMessage" class="small mt-1"></div>
    
</div>

<button class="btn btn-primary w-100 mt-2">
Register
</button>

<div class="login-link">
<a href="/login">Already have account? Login</a>
</div>

</form>

</div>

</div>

<script>

    function togglePassword() {
    
    const passwordField = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");
    
    if (passwordField.type === "password") {
    passwordField.type = "text";
    eyeIcon.classList.remove("bi-eye");
    eyeIcon.classList.add("bi-eye-slash");
    } 
    else {
    passwordField.type = "password";
    eyeIcon.classList.remove("bi-eye-slash");
    eyeIcon.classList.add("bi-eye");
    }
    
    }
    
    function checkStrength(){
    
    const password = document.getElementById("password").value;
    const strengthText = document.getElementById("passwordStrength");
    const bar = document.getElementById("strengthBar");
    
    let strength = 0;
    
    if(password.length >= 6) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[!@#$%^&*]/.test(password)) strength++;
    
    bar.style.width = (strength * 25) + "%";
    
    if(password.length === 0){
    strengthText.innerHTML = "";
    bar.style.width = "0%";
    return;
    }
    
    if(strength <= 1){
    bar.className = "progress-bar bg-danger";
    strengthText.innerHTML = "Weak password";
    }
    
    else if(strength <= 3){
    bar.className = "progress-bar bg-warning";
    strengthText.innerHTML = "Medium strength";
    }
    
    else{
    bar.className = "progress-bar bg-success";
    strengthText.innerHTML = "Strong password";
    }
    
    }
    
    function checkMatch(){
    
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const message = document.getElementById("matchMessage");
    
    if(confirm.length === 0){
    message.innerHTML = "";
    return;
    }
    
    if(password === confirm){
    message.innerHTML = "<span style='color:green'>Passwords match</span>";
    }
    else{
    message.innerHTML = "<span style='color:red'>Passwords do not match</span>";
    }
    
    }
    
</script>

</body>
</html>
