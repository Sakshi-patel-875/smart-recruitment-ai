<!DOCTYPE html>
<html>
<head>

<title>Session Candidates</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h3>Session {{ session.id }}</h3>

<p><b>Job Description:</b> {{ session.job_description }}</p>

<table class="table table-bordered">

<tr>
<th>Candidate</th>
<th>Score</th>
<th>Experience</th>
<th>Recommendation</th>
</tr>

{% for c in candidates %}

<tr>

<td>{{ c.name }}</td>

<td>{{ c.score }}%</td>

<td>{{ c.experience }} years</td>

<td>{{ c.recommendation }}</td>

</tr>

{% endfor %}

</table>

<a href="/history" class="btn btn-secondary mt-3">
Back to History
</a>

</div>

</body>
</html>
